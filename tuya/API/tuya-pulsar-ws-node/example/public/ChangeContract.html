<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Change Contract - Control4</title>
</head>

<body>
    <h2>Send Contract Change to Control4 Driver</h2>

    <form id="contractForm">
        <label>
            Event Name:
            <input type="text" id="eventName" value="ChangeContract" disabled readonly required />
        </label><br><br>

        <label>
            User ID:
            <input type="text" id="userId" value="" required />
        </label><br><br>

        <label>
            Contract:
            <select id="contract">
                <option value="Enable">Enable</option>
                <option value="Disable">Disable</option>
            </select>
        </label><br><br>

        <button type="submit">Send</button>
    </form>

    <div id="responseBox"></div>

    <script>
        document.getElementById('contractForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const message = {
                EventName: document.getElementById('eventName').value,
                UserId: document.getElementById('userId').value,
                Contract: document.getElementById('contract').value
            };

            try {
                const response = await fetch('/send-to-control4', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });

                const result = await response.json();
                document.getElementById('responseBox').innerText = JSON.stringify(result, null, 2);
            } catch (error) {
                document.getElementById('responseBox').innerText = 'Error: ' + error.message;
            }
        });
    </script>
</body>

</html>
