<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Send Message to Control4</title>
</head>

<body>
    <h2>Change Client and Secret for all Control4 Driver</h2>
    <form id="messageForm">
        <label>
            Event Name:
            <input type="text" id="eventName" value="ChangeGlobalKeys" readonly disabled required />
        </label><br><br>
        <label>
            Client ID:
            <input type="text" id="clientId" required />
        </label><br><br>
        <label>
            Client Secret:
            <input type="text" id="clientSecret" required />
        </label><br><br>
        <button type="submit">Send</button>
    </form>

    <div id="result"></div>

    <script>
        document.getElementById('messageForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const message = {
                EventName: document.getElementById('eventName').value,
                ClientId: document.getElementById('clientId').value,
                ClientSecret: document.getElementById('clientSecret').value
            };

            try {
                const response = await fetch('/send-to-control4', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ message })
                });

                const result = await response.json();
                document.getElementById('result').innerText = JSON.stringify(result, null, 2);
            } catch (err) {
                document.getElementById('result').innerText = 'Error sending message: ' + err.message;
            }
        });
    </script>
</body>

</html>
