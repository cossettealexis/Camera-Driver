<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Notification History</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <style>
    body { background: #0a0a0c; color: #e8e8f0; font-family: Arial, sans-serif; margin: 0; padding: 0; }
    .header { background: #111; padding: 15px 20px; border-bottom: 1px solid #333; }
    .header h1 { font-size: 20px; margin: 0; color: white; }
    #historyList { padding: 20px; }
    .history-card { background: #1a1a1d; margin: 10px 0; padding: 15px; border-radius: 12px; cursor: pointer; border: 2px solid transparent; transition: all 0.2s; }
    .history-card:hover { border-color: #6c5ce7; transform: translateY(-2px); }
    .history-card.active { border-color: #00ff00; }
    .card-content { display: flex; align-items: center; gap: 15px; }
    .card-thumbnail { width: 120px; height: 80px; background: #333; border-radius: 8px; object-fit: cover; }
    .card-info { flex: 1; }
    .card-title { font-size: 18px; font-weight: bold; margin-bottom: 5px; }
    .card-type { color: #aaa; font-size: 14px; margin-bottom: 3px; }
    .card-time { color: #777; font-size: 13px; }
    .card-icon { font-size: 32px; }
    
    #mediaModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100000; }
    #mediaModal.show { display: flex; align-items: center; justify-content: center; padding: 20px; }
    .modal-content { textAlign: center; max-width: 800px; width: 100%; }
    .modal-image { max-width: 100%; border-radius: 12px; margin: 20px 0; }
    .modal-controls { display: flex; gap: 15px; justify-content: center; margin-top: 30px; flex-wrap: wrap; }
    .modal-controls button { padding: 15px 35px; font-size: 18px; background: #333; color: white; border: 2px solid white; border-radius: 10px; cursor: pointer; }
    .modal-controls button:hover { background: #6c5ce7; }
    .modal-controls button:disabled { opacity: 0.3; cursor: not-allowed; }
    #closeModal { position: absolute; top: 20px; right: 20px; font-size: 36px; color: white; cursor: pointer; background: rgba(0,0,0,0.7); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    #closeModal:hover { background: #e17055; transform: rotate(90deg); }
  </style>
</head>
<body>
  <div class="header">
    <h1>📱 Notification History - UI DEMO</h1>
  </div>
  
  <div id="historyList"></div>
  
  <div id="mediaModal">
    <div id="closeModal">✖</div>
    <div class="modal-content" id="modalContent"></div>
  </div>

  <script>
    // FAKE DATA - NO BACKEND
    var NOTIFICATIONS = [
      { device_name: "Front Door Camera", message_type: "Doorbell Pressed", time: Date.now()/1000 - 3600, image_url: "https://via.placeholder.com/400x300/4a90e2/ffffff?text=Front+Door" },
      { device_name: "Outdoor Camera (Solar)", message_type: "Motion Detected", time: Date.now()/1000 - 7200, image_url: "https://via.placeholder.com/400x300/e74c3c/ffffff?text=Motion+1" },
      { device_name: "Front Door Camera", message_type: "Doorbell Pressed", time: Date.now()/1000 - 10800, image_url: "https://via.placeholder.com/400x300/4a90e2/ffffff?text=Front+Door" },
      { device_name: "Outdoor Camera (Solar)", message_type: "Motion Detected", time: Date.now()/1000 - 14400, image_url: "https://via.placeholder.com/400x300/e74c3c/ffffff?text=Motion+2" },
      { device_name: "Outdoor Camera (Solar)", message_type: "Motion Detected", time: Date.now()/1000 - 18000, image_url: "https://via.placeholder.com/400x300/e74c3c/ffffff?text=Motion+3" },
      { device_name: "Back Yard Camera", message_type: "Person Detected", time: Date.now()/1000 - 21600, image_url: "https://via.placeholder.com/400x300/f39c12/ffffff?text=Person" },
      { device_name: "Front Door Camera", message_type: "Package Delivery", time: Date.now()/1000 - 25200, image_url: "https://via.placeholder.com/400x300/27ae60/ffffff?text=Package" },
      { device_name: "Outdoor Camera (Solar)", message_type: "Motion Detected", time: Date.now()/1000 - 28800, image_url: "https://via.placeholder.com/400x300/e74c3c/ffffff?text=Motion+4" }
    ];
    
    var currentIndex = 0;
    
    function renderList() {
      var html = '';
      for (var i = 0; i < NOTIFICATIONS.length; i++) {
        var n = NOTIFICATIONS[i];
        var date = new Date(n.time * 1000);
        var active = i === currentIndex ? 'active' : '';
        html += '<div class="history-card ' + active + '" onclick="openClip(' + i + ')">';
        html += '<div class="card-content">';
        html += '<img src="' + n.image_url + '" class="card-thumbnail">';
        html += '<div class="card-info">';
        html += '<div class="card-title">' + n.device_name + '</div>';
        html += '<div class="card-type">' + n.message_type + '</div>';
        html += '<div class="card-time">' + date.toLocaleString() + '</div>';
        html += '</div>';
        html += '<div class="card-icon">▶️</div>';
        html += '</div>';
        html += '</div>';
      }
      document.getElementById('historyList').innerHTML = html;
    }
    
    function openClip(index) {
      currentIndex = index;
      var n = NOTIFICATIONS[index];
      var date = new Date(n.time * 1000);
      
      var html = '<div style="color:white;">';
      html += '<h2 style="margin-bottom:10px;">' + n.device_name + '</h2>';
      html += '<p style="color:#aaa;margin-bottom:20px;">' + n.message_type + ' - ' + date.toLocaleString() + '</p>';
      html += '<img src="' + n.image_url + '" class="modal-image">';
      html += '<div style="font-size:28px;font-weight:bold;margin-top:20px;">' + (index + 1) + ' of ' + NOTIFICATIONS.length + '</div>';
      html += '<div style="color:#888;margin-top:10px;">← Swipe or use arrow keys →</div>';
      html += '<div class="modal-controls">';
      html += '<button onclick="prevClip()" ' + (index === 0 ? 'disabled' : '') + '>⬅️ PREV</button>';
      html += '<button onclick="closeModal()" style="background:#666;">✖️ CLOSE</button>';
      html += '<button onclick="nextClip()" ' + (index === NOTIFICATIONS.length - 1 ? 'disabled' : '') + '>NEXT ➡️</button>';
      html += '</div>';
      html += '</div>';
      
      document.getElementById('modalContent').innerHTML = html;
      document.getElementById('mediaModal').classList.add('show');
      renderList();
    }
    
    function closeModal() {
      document.getElementById('mediaModal').classList.remove('show');
    }
    
    function nextClip() {
      if (currentIndex < NOTIFICATIONS.length - 1) openClip(currentIndex + 1);
    }
    
    function prevClip() {
      if (currentIndex > 0) openClip(currentIndex - 1);
    }
    
    // KEYBOARD
    document.addEventListener('keydown', function(e) {
      if (document.getElementById('mediaModal').classList.contains('show')) {
        if (e.key === 'ArrowRight') nextClip();
        if (e.key === 'ArrowLeft') prevClip();
        if (e.key === 'Escape') closeModal();
      }
    });
    
    // SWIPE
    var touchStartX = 0;
    document.getElementById('mediaModal').addEventListener('touchstart', function(e) {
      touchStartX = e.touches[0].clientX;
    });
    document.getElementById('mediaModal').addEventListener('touchend', function(e) {
      var touchEndX = e.changedTouches[0].clientX;
      if (touchStartX - touchEndX > 50) nextClip(); // Swipe left
      if (touchEndX - touchStartX > 50) prevClip(); // Swipe right
    });
    
    // CLOSE BUTTON
    document.getElementById('closeModal').onclick = closeModal;
    
    // RENDER ON LOAD
    renderList();
  </script>
</body>
</html>
