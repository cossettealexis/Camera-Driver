<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Notification History</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />

  <style>
    :root {
      --bg: #0a0a0c;
      --surface: #111114;
      --card: #18181d;
      --border: #2a2a32;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --accent: #6c5ce7;
      --accent2: #00cec9;
      --danger: #e17055;
      --warning: #fdcb6e;
      --success: #00b894;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }




    /* ── HEADER ── */
    .app-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10, 10, 12, 0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .app-header .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .app-header h1 {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.2px;
      flex: 1;
      margin-top: 10px;
    }

    .badge-count {
      background: var(--accent);
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      font-family: 'DM Mono', monospace;
    }

    /* ── FILTER BAR ── */
    .filter-bar {
      padding: 12px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .filter-bar i {
      color: var(--muted);
      font-size: 15px;
      flex-shrink: 0;
    }

    #cameraFilter {
      flex: 1;
      background: var(--card);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
      cursor: pointer;
    }

    #cameraFilter:focus {
      border-color: var(--accent);
    }

    /* ── MAIN CONTENT ── */
    .main {
      padding: 16px;
    }

    /* ── STATUS BAR ── */
    #statusBar {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 14px;
      font-size: 13px;
      color: var(--muted);
    }

    #statusBar.visible {
      display: flex;
    }

    #statusBar .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ── HISTORY CARDS ── */
    #historyList {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .history-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s;
      animation: fadeUp 0.3s ease both;
      margin-bottom: 2px !important;
    }

    .history-card:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    .history-card:active {
      transform: scale(0.98);
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }



    .history-card:hover {
      background: #2a2a2d;
    }

    .history-image {
      width: 60px;
      height: 60px;
      border-radius: 8px;
      object-fit: cover;
      margin-right: 12px;
      border: 1px solid #2c2c2e;
      flex-shrink: 0;
    }

    .history-info {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .history-title {
      font-size: 14px;
      font-weight: 600;
    }

    .history-message {
      font-size: 13px;
      color: #ccc;
      margin-top: 2px;
    }

    .history-time {
      font-size: 12px;
      color: #aaa;
      margin-top: 4px;
    }

    .empty-state {
      text-align: center;
      margin-top: 30px;
      color: #777;
    }

    /* Modal */
    #mediaModal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.95);
      z-index: 9999;
      padding: 20px;
    }

    .clip-viewer {
      max-width: 1200px;
      margin: 0 auto;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 20px;
    }

    .clip-media {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    .clip-media img,
    .clip-media video {
      max-width: 100%;
      max-height: 70vh;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }

    .clip-info {
      background: rgba(24, 24, 29, 0.95);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 24px;
      text-align: center;
      min-width: 300px;
    }

    .clip-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }

    .clip-time {
      font-size: 13px;
      color: var(--muted);
    }

    .clip-nav-controls {
      display: flex;
      align-items: center;
      gap: 24px;
      background: rgba(24, 24, 29, 0.95);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 12px 24px;
    }

    .nav-btn {
      background: var(--accent);
      border: none;
      color: white;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 20px;
      transition: all 0.2s;
      outline: none;
    }

    .nav-btn:hover:not(:disabled) {
      background: var(--accent2);
      transform: scale(1.1);
    }

    .nav-btn:active:not(:disabled) {
      transform: scale(0.95);
    }

    .nav-btn:disabled {
      background: var(--border);
      color: var(--muted);
      cursor: not-allowed;
      opacity: 0.5;
    }

    .clip-position {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      min-width: 80px;
      text-align: center;
      font-family: 'DM Mono', monospace;
    }

    #closeModal {
      position: absolute;
      top: 20px;
      right: 20px;
      font-size: 28px;
      color: #fff;
      cursor: pointer;
      background: rgba(24, 24, 29, 0.8);
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      z-index: 10000;
    }

    #closeModal:hover {
      background: var(--danger);
      transform: rotate(90deg) scale(1.1);
    }

    /* Swipe hint animation */
    @keyframes swipeHint {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(10px); }
    }

    /* Responsive adjustments */
    @media (max-width: 768px) {
      .clip-nav-controls {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
      }
      
      .clip-info {
        position: fixed;
        top: 80px;
        left: 20px;
        right: 20px;
        min-width: auto;
      }
      
      #closeModal {
        top: 10px;
        right: 10px;
        width: 40px;
        height: 40px;
        font-size: 20px;
      }
    }
  </style>
</head>

<body>
  <div class="app-header">
    <div class="logo"><i class="bi bi-bell-fill" style="color:#fff;font-size:14px;"></i></div>
    <h1>Notification History</h1>
    <span class="badge-count" id="totalCount">0</span>
  </div>



  <!-- FILTER BAR -->
  <div class="filter-bar">
    <i class="bi bi-camera-video"></i>
    <select id="cameraFilter">
      <option value="all">All Cameras</option>
    </select>
  </div>

  <div class="main">
    <!-- STATUS -->
    <div id="statusBar">
      <div class="spinner"></div>
      <span id="statusText">Loading notifications...</span>
    </div>

    <!-- LIST -->
    <div id="historyList">
      <div class="empty-state">
        <i class="bi bi-hourglass-split"></i>
        <p>Connecting to driver...</p>
      </div>
    </div>
  </div>



  <!-- MODAL -->
  <div id="mediaModal">
    <i class="bi bi-x-lg" id="closeModal"></i>
    <div id="mediaContainer"></div>
  </div>

  <script src="js/jquery-3.7.1.js"></script>

  <script src="javascript/index.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

 
</body>

</html>
