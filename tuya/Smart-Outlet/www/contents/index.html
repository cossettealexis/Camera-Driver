<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Smart Outlet</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header class="header">
        <img src="images/slomins-logo-new-white.png" alt="Slomins">
    </header>
    <main>
        <div class="smartoutletui" style="display:none;">
            <div class="switch-container">
                <div class="switch-inner">
                    <div class="outlet-img-container">
                        <img src="images/outlet.png" alt="outlet" class="outlet-img">
                        <div class="light-indicator" id="light-indicator1"></div>
                    </div>
                    <div>
                        <button class="tactile-button" onclick="toggleSwitch(1)" id="switch1">Power OFF</button>
                    </div>
                </div>

                <div class="switch-inner">
                    <div class="outlet-img-container">
                        <img src="images/outlet.png" alt="outlet" class="outlet-img">
                        <div class="light-indicator" id="light-indicator2"></div>
                    </div>

                    <div>
                        <button class="tactile-button" onclick="toggleSwitch(2)" id="switch2">Power OFF</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!--Smartlock start-->
    <script src="js/jquery-3.7.1.js"></script>
    <script src="javascript/index.js" type="text/javascript"></script>
    </script>

</body>

</html>
