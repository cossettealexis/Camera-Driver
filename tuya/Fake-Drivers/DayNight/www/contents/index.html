<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Slomin's ShieldLink</title>
    <style>
        body {
            background-color: #0e1821;
            font-family: "Poppins", sans-serif;
            padding: 0;
            overflow: hidden;
        }

        /*Smart lock start*/
        .smart_lock_btn svg path {
            fill: #9c9c9f;
        }

        .smart_lock_btn .lock_icon {
            display: none;
        }

        .smart_lock_wrap {
            min-height: calc(100vh - 90px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .smart_lock_inner {
            display: flex;
            justify-content: center;
            width: 100%;
            flex-direction: column;
            align-items: center;
        }

        .smart_lock_btn {
            width: 100%;
            max-width: 225px;
            height: 225px;
            border-radius: 100%;
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            border: none;
        }

        .smart_lock_btn span {
            width: 100%;
            text-align: center;
        }

        .smart_lock_btn span svg {
            height: 90px;
        }

        /*.smart_lock_btn.lock{border-color:#d61a4b;background:#3d1909;}*/
        .smart_lock_btn.lock .unlock_icon {
            display: none;
        }

        .smart_lock_btn.lock .lock_icon {
            display: block;
        }

        .lock_status {
            margin-top: 25px;
            font-size: 18px;
        }

        .smart_lock_btn .lock_status {
            color: #9c9c9f;
        }

        /*.smart_lock_btn.lock .lock_status{color:#d61a4b;}*/
        .smart_lock_btn.lock .lock_icon svg path {
            fill: #d61a4b;
        }

        .smart_lock_btn img {
            max-width: 150px;
        }

        .smart_lock_wrap h1 {
            font-size: 24px;
            color: #fff;
            margin-bottom: 0;
            margin-top: 30px;
        }

        /*Smart lock end*/
    </style>
</head>

<body>
    <div class="overlay"></div>
    <div class="smart_lock_wrap">
        <div class="smart_lock_inner">
            <button class="smart_lock_btn">
                <span class="unlock_icon">
                    <img src="images/sun-icon.png" alt="Left Home" />
                </span>
                <span class="lock_icon">
                    <img src="images/moon-icon.png" alt="Arrive Home" />
                </span> 
            </button>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.js"></script>
    <script>
        $(document).ready(function () {
            //Smart lock functionality start
            $('.smart_lock_btn').on('click', function () {
                //alert('1111');
                if (!$(this).hasClass('lock')) {
                    $(this).addClass('lock');
                    $(this).find('.lock_status').text('DisArmed');
                } else {
                    $(this).removeClass('lock');
                    $(this).find('.lock_status').text('Armed');
                }
            });
            //Smart lock functionality end
        });
    </script>

</body>

</html>
