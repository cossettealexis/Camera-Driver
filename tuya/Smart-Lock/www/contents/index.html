<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Smart Lock</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

        body {
            background: linear-gradient(to bottom, #e7e7e7 0%, #bec0c3 99%);
            font-family: "Poppins", sans-serif;
            padding: 0;
            overflow: hidden;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        img {
            max-width: 100%;
        }

        .header {
            padding: 10px 15px;
            text-align: center;
            background: #1a2228;
            margin-bottom: 10px;
        }

        .header img {
            max-height: 40px;
        }

        /*Smart lock start*/

        .smart_lock_btn .lock_icon {
            display: none;
        }

        .smart_lock_wrap {
            min-height: calc(100vh - 90px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .smart_lock_inner {
            display: flex;
            justify-content: center;
            width: 100%;
        }

        .smart_lock_btn {
            width: 100%;
            max-width: 300px;
            height: 300px;
            border-radius: 100%;
            background: radial-gradient(ellipse at center, #fbe6d2 0%, #f59c78 100%);
            ;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            border: 20px solid #F57351;
            position: relative;
        }

        .smart_lock_btn.lock {
            background: radial-gradient(ellipse at center, #e4efe9 0%, #93a5cf 100%);
        }

        .smart_lock_btn .unlock_icon svg path {
            fill: #F57351;
        }

        .smart_lock_btn .lock_icon {}

        .smart_lock_btn span {
            width: 100%;
            text-align: center;
        }

        .smart_lock_btn span svg {
            height: 90px;
        }

        .smart_lock_btn.lock {
            border-color: #00aaff;
        }

        .smart_lock_btn.lock .unlock_icon {
            display: none;
        }

        .smart_lock_btn.lock .lock_icon {
            display: block;
        }

        .lock_status {
            margin-top: 10px;
            font-size: 14px;
        }

        .smart_lock_btn .lock_status {
            color: #455a64;
            font-weight: 600;
        }

        .smart_lock_btn.lock .lock_status {
            color: #455a64;
            font-weight: 600;
        }

        .smart_lock_btn.lock .lock_icon svg path {
            fill: #00aaff;
        }

        .sucess_popup {
            position: absolute;
            bottom: 15%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: #fff;
            border-radius: 200px;
            padding: 8px 20px;
            color: #1a2228;
            border: 1px solid #1a2228;
            display: none;
        }

        .circle-shade {
            position: absolute;
            width: 300px !important;
        }

        .circle-shade circle {
            stroke-dasharray: 296 296;
            stroke-dashoffset: 296;
            animation: grow 2s ease-out infinite;

        }

        .circle-shade .lock {
            stroke: #f3532a;
        }

        .circle-shade .unlock {
            stroke: #099ce3;
        }

        @keyframes grow {
            100% {
                stroke-dashoffset: 0;
            }
        }

        .smart_lock_btn img {
            max-width: 130px;
        }

        /*Smart lock end*/
    </style>
</head>

<body>
    <div class="sucess_popup">Sucess</div>
    <div class="overlay"></div>
    <!--Header start-->
    <div class="smartlockui" style="display:none;">
        <header class="header">
            <img src="images/slomins-logo-new-white.png" alt="Slomins" />
        </header>
        <!--Header end-->
        <!--Smartlock start-->
        <div class="smart_lock_wrap">
            <div class="smart_lock_inner">
                <button class="smart_lock_btn">
                    <svg class="circle-shade" viewBox="0 0 100 100" style="display: none;">
                        <circle class="lock" cx="50" cy="50" r="47" transform="rotate(-90 50 50)" pointer-events="all"
                            stroke-width="6" fill="none" />
                    </svg>
                    <span class="unlock_icon">
                        <img src="images/unlock.png" alt="Unlock" />
                        <!-- <?xml version="1.0" encoding="UTF-8"?>
                        <svg id="Layer_1" data-name="Layer 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 700">
                            <defs>
                                <style>
                                    .cls-1 {
                                        fill-rule: evenodd;
                                    }
                                </style>
                            </defs>
                            <path class="cls-1"
                                d="M501.33,200h-66.67c0-73.64-59.7-133.33-133.33-133.33s-133.33,59.7-133.33,133.33v100H500c55.23,0,100,44.77,100,100v200c0,55.23-44.77,100-100,100H100C44.77,700,0,655.23,0,600v-200C0,344.77,29.77,300,85,300h16.33v-100C101.33,89.54,190.88,0,301.33,0s200,89.54,200,200Zm-1.33,166.67H100c-18.41,0-33.33,14.92-33.33,33.33v200c0,18.41,14.92,33.33,33.33,33.33H500c18.41,0,33.33-14.92,33.33-33.33v-200c0-18.41-14.92-33.33-33.33-33.33Z" />
                        </svg> -->
                    </span>
                    <span class="lock_icon">
                        <img src="images/lock.png" alt="Lock" />
                        <!-- <?xml version="1.0" encoding="UTF-8"?>
                        <svg id="Layer_1" data-name="Layer 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 700">
                            <defs>
                                <style>
                                    .cls-1 {
                                        fill-rule: evenodd;
                                    }
                                </style>
                            </defs>
                            <path class="cls-1"
                                d="M500,300c55.23,0,100,44.77,100,100v200c0,55.23-44.77,100-100,100H100c-55.23,0-100-44.77-100-100v-200c0-55.23,44.77-100,100-100v-100C100,89.54,189.54,0,300,0s200,89.54,200,200v100ZM300,66.67c73.64,0,133.33,59.7,133.33,133.33v100H166.67v-100c0-73.64,59.7-133.33,133.33-133.33Zm200,300H100c-18.41,0-33.33,14.92-33.33,33.33v200c0,18.41,14.92,33.33,33.33,33.33H500c18.41,0,33.33-14.92,33.33-33.33v-200c0-18.41-14.92-33.33-33.33-33.33Z" />
                        </svg> -->
                    </span>
                    <span class="lock_status">Hold to lock</span>
                </button>
            </div>
        </div>
    </div>
    <!--Smartlock start-->

    <script src="js/jquery-3.7.1.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <script src="javascript/index.js" type="text/javascript"></script>

</body>

</html>
