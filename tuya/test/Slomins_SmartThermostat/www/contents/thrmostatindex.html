<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Smart Thermostat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" type="text/css" href="css/thrmostatindex.css">
</head>

<body>
    <!--Loading start-->
    <div id="loading" class="loading" style="display: none;">
        <div class="loading_wrap">
            <div class="loading_inner">
                <p>Loading....</p>
                <div class="loading_spinner"></div>
            </div>
        </div>
    </div>
    <!--Loading end-->
    <label id="lblMode" style="display: none;"></label>
    <label id="lblHeatTemperature" style="display: none;"></label>
    <label id="lblCoolTemperature" style="display: none;"></label>
    <label id="lblCurrentTemperature" style="display: none;"></label>
    <label id="lblCurrentHumidity" style="display: none;"></label>
    <label id="lblTemperatureSet" style="display: none;"></label>
    <label id="lblHeatTemperatureF" style="display: none;"></label>
    <label id="lblCoolTemperatureF" style="display: none;"></label>
    <label id="lblCurrentTemperatureF" style="display: none;"></label>
    <label id="lblTemperatureSetF" style="display: none;"></label>
    <label id="lblTemperatureUnitConvert" style="display: none;"></label>
    <label id="lblFanMode" style="display: none;"></label>
    <label id="lblSwitchEmerEnabled" style="display: none;"></label>
    <label id="lblSwitchProgramEnabled" style="display: none;"></label>

    <div class="overlay"></div>
    <div class="thermostatUI" style="display: none;">
        <!--Header start-->
        <header class="header">
            <img src="images/slomins-logo-new-white.png" alt="Slomins" />
        </header>
        <!--Header end-->
        <!--Top tabbing-->
        <ul class="nav nav-tabs" id="myTab" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="temp-tab" data-bs-toggle="tab" data-bs-target="#temp-tab-pane"
                    type="button" role="tab" aria-controls="temp-tab-pane" aria-selected="true">Temperature</button>
            </li>
            <li class="nav-item" role="presentation" style="display:none;">
                <button class="nav-link" id="schedule-tab" data-bs-toggle="tab" data-bs-target="#schedule-tab-pane"
                    type="button" role="tab" aria-controls="schedule-tab-pane" aria-selected="false">Schedule</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="extras-tab" data-bs-toggle="tab" data-bs-target="#extras-tab-pane"
                    type="button" role="tab" aria-controls="extras-tab-pane" aria-selected="false">Extras</button>
            </li>
        </ul>
        <div class="tab-content" id="myTabContent">
            <div class="tab-pane fade show active" id="temp-tab-pane" role="tabpanel" aria-labelledby="temp-tab"
                tabindex="0">
                <div class="current_temp_humidity_blk">
                    <!-- <div class="current_temp">
                    <img src="images/night-icon.png" alt="icon" />
                    <span id="current_temp">30°</span>
                </div>  -->
                    <div class="humidity">
                        <img src="images/drop-icon.png" alt="icon" />
                        <span>40%</span>
                    </div>
                </div>
                <div class="thermostat_parent">
                    <div class="thermostat_outer">
                        <div class="thermostat_wrap" id="thermostat_wrap" data-tempmode="off_mode">
                            <div class="thermostat_inner">
                                <div class="thermostat">
                                    <div class="current_temp_blk">
                                        <span>
                                            <span id="current_temp">32</span>
                                        </span>
                                    </div>

                                </div>
                            </div>

                            <!--Up/Down arrow buttons-->
                            <div class="buttons">
                                <button id="decrease-temp"><svg xmlns="http://www.w3.org/2000/svg"
                                        viewBox="0 0 448 512"><!--!Font Awesome Free 6.7.2 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2025 Fonticons, Inc.-->
                                        <path
                                            d="M201.4 374.6c12.5 12.5 32.8 12.5 45.3 0l160-160c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L224 306.7 86.6 169.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3l160 160z" />
                                    </svg>
                                </button>
                                <!--Display temperature-->
                                <div id="temperature" class="temperature">
                                    <span class="heat_temp">20</span>
                                    <span class="dotted_line"></span>
                                    <span class="cool_temp selected_mode">30</span>

                                </div>
                                <button id="increase-temp"><svg xmlns="http://www.w3.org/2000/svg"
                                        viewBox="0 0 448 512"><!--!Font Awesome Free 6.7.2 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2025 Fonticons, Inc.-->
                                        <path
                                            d="M201.4 137.4c12.5-12.5 32.8-12.5 45.3 0l160 160c12.5 12.5 12.5 32.8 0 45.3s-32.8 12.5-45.3 0L224 205.3 86.6 342.6c-12.5 12.5-32.8 12.5-45.3 0s-12.5-32.8 0-45.3l160-160z" />
                                    </svg></button>
                            </div>
                        </div>
                    </div>
                    <div class="mode_wrap">
                        <!--Mode, Fan and Off buttons start-->
                        <div class="all_btns">
                            <button class="mode_popup_btn all_mode_btn" data-id="1" data-activemode="off_mode">
                                <div class="mode_icon">
                                </div>
                                <div class="mode_label">Mode</div>
                            </button>
                            <button class="mode_popup_btn fan_btn" data-id="2">
                                <div class="mode_icon">
                                    <img src="images/fan-icon.png" alt="icon" />
                                </div>
                                <div class="mode_label">Fan</div>
                            </button>
                            <button class="mode_popup_btn off_btn" data-id="3" style="display:none;">
                                <div class="mode_icon">
                                    <img src="images/off-icon.png" alt="icon" />
                                </div>
                                <div class="mode_label">Off</div>
                            </button>
                        </div>
                        <!--Mode, Fan and Off buttons end-->
                        <!--All mode popup start-->
                        <div class="all_mode_items mode_popup_wrap close_popup">
                            <div class="popup_title">Mode</div>
                            <div class="mode_items hvacmodes">
                                <ul>
                                    <li class="active_mode">
                                        <button data-mode="off_mode">
                                            <span class="btn_lbl">Off</span>
                                            <span class="btn_icon"><img src="images/check-circle.png"
                                                    alt="icon" /></span>
                                        </button>
                                    </li>
                                    <li>
                                        <button data-mode="heat_mode">
                                            <span class="btn_lbl">Heat</span>
                                            <span class="btn_icon"><img src="images/check-circle.png"
                                                    alt="icon" /></span>
                                        </button>
                                    </li>
                                    <li>
                                        <button data-mode="cool_mode">
                                            <span class="btn_lbl">Cool</span>
                                            <span class="btn_icon"><img src="images/check-circle.png"
                                                    alt="icon" /></span>
                                        </button>
                                    </li>
                                    <li>
                                        <button data-mode="auto_mode">
                                            <span class="btn_lbl">Auto</span>
                                            <span class="btn_icon"><img src="images/check-circle.png"
                                                    alt="icon" /></span>
                                        </button>
                                    </li>
                                    <!-- <li>
                                    <button data-mode="emergency_heat_mode">
                                        <span class="btn_lbl">Emergency Heat</span>
                                        <span class="btn_icon"><img src="images/check-circle.png" alt="icon" /></span>
                                    </button>
                                </li> -->
                                </ul>
                            </div>
                            <div class="cancel_btn_wrap">
                                <button class="cancel_popup_btn">Cancel</button>
                            </div>
                        </div>
                        <!--All mode popup end-->
                        <!--Fan mode popup start-->
                        <div class="fan_mode_items mode_popup_wrap close_popup">
                            <div class="popup_title">Fan</div>
                            <div class="mode_items fanmodes">
                                <ul>
                                    <li>
                                        <button data-mode="fan_auto_mode">
                                            <span class="btn_lbl">Auto</span>
                                            <span class="btn_icon"><img src="images/check-circle.png"
                                                    alt="icon" /></span>
                                        </button>
                                    </li>
                                    <li>
                                        <button data-mode="fan_on_mode">
                                            <span class="btn_lbl">On</span>
                                            <span class="btn_icon"><img src="images/check-circle.png"
                                                    alt="icon" /></span>
                                        </button>
                                    </li>
                                </ul>
                            </div>
                            <div class="cancel_btn_wrap">
                                <button class="cancel_popup_btn">Cancel</button>
                            </div>
                        </div>
                        <!--Fan mode popup end-->
                    </div>
                </div>
            </div>
            <div class="tab-pane fade" id="schedule-tab-pane" role="tabpanel" aria-labelledby="schedule-tab"
                tabindex="0" style="display:none;">
                Coming soon...</div>
            <div class="tab-pane fade" id="extras-tab-pane" role="tabpanel" aria-labelledby="extras-tab" tabindex="0">
                <div class="temp_scale_blk">
                    <div class="temp_scale_btn_blk">
                        <button class="temp_scale_btn">
                            <span class="btn_lbl">
                                <span class="btn_title">Temperature Scale</span>
                                <span class="temp_unit">Fahrenheit</span>
                            </span>
                            <span class="btn_icon"><svg xmlns="http://www.w3.org/2000/svg"
                                    viewBox="0 0 320 512"><!--!Font Awesome Free 6.7.2 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2025 Fonticons, Inc.-->
                                    <path
                                        d="M310.6 233.4c12.5 12.5 12.5 32.8 0 45.3l-192 192c-12.5 12.5-32.8 12.5-45.3 0s-12.5-32.8 0-45.3L242.7 256 73.4 86.6c-12.5-12.5-12.5-32.8 0-45.3s32.8-12.5 45.3 0l192 192z" />
                                </svg></span>
                        </button>
                    </div>
                    <div class="mode_wrap">
                        <!--Extras popup start-->
                        <div class="temp_scale_items mode_popup_wrap close_popup">
                            <div class="popup_title">Temperature Scale</div>
                            <div class="mode_items tempmodes">
                                <ul>
                                    <li>
                                        <button data-mode="fahrenheit_mode">
                                            <span class="btn_lbl">Fahrenheit</span>
                                            <span class="btn_icon"><img src="images/check-circle.png"
                                                    alt="icon" /></span>
                                        </button>
                                    </li>
                                    <li>
                                        <button data-mode="celsius_mode">
                                            <span class="btn_lbl">Celsius</span>
                                            <span class="btn_icon"><img src="images/check-circle.png"
                                                    alt="icon" /></span>
                                        </button>
                                    </li>
                                </ul>
                            </div>
                            <div class="cancel_btn_wrap">
                                <button class="cancel_popup_btn">Cancel</button>
                            </div>
                        </div>
                        <!--Extras popup end-->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <script src="javascript/thrmostatindex.js" type="text/javascript"></script>

</body>

</html>
