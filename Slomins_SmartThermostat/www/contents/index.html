    <link rel="stylesheet" type="text/css" href="css/index.css">
   <style>
         .screen {
            /* height: 100vh;
            position: relative; */
        }

        .center-value {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            border: 2px solid #fff;
            border-radius: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            background: rgba(20, 20, 20, 0.8);
            color: #fff;
        }

        .bottom-sheet {
            position: absolute;
            bottom: -100%;
            left: 0;
            width: 100%;
            background: #2b2b2d;
            border-radius: 30px 30px 0 0;
            padding: 20px;
            box-sizing: border-box;
            transition: 0.4s;
        }

        .bottom-sheet.show {
            bottom: 0;
        }

        .temptitle {
            text-align: center;
            font-size: 14px;
            padding-bottom: 10px;
            color: #fff;
            border-bottom: 1px solid #fff;
        }
        
        .picker::-webkit-scrollbar {
            display: none;
        }

        .picker-wrapper {
            position: relative;
            height: 140px;
            overflow: hidden;
        }




        .picker {
            height: 150px;
            overflow-y: auto;
            scroll-snap-type: y mandatory;
            padding-top: 60px;
            padding-bottom: 60px;
            margin: 5%;
        }

        .picker-item {
             height: 60px;
            line-height: 60px;
            text-align: center;
            font-size: 16px;
            color: #777;
            scroll-snap-align: center;
        }

        .picker-item.active {
            color: #fff;
             border: 2px solid;
            border-radius: 40px;
        }

        .selection-box {
            position: absolute;
            top: 80px;
            left: 20px;
            right: 20px;
            height: 80px;
            border: 2px solid #fff;
            border-radius: 50px;
            pointer-events: none;
        }

        .buttonst {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
        }

        .buttonst {
            height: 55px;
            border-radius: 14px;
            background: transparent;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
        }

        .open-btn {
            position: absolute;
            top: 50px;
            right: 30px;
            font-size: 24px;
            background: none;
            border: none;
            color: white;
        }

        .buttonst button {
            width: 49%;
            border: 2px solid #fff;
            border-radius: 20px;
            background-color: #323232;
            color: #fff;
        }

        .mode_popup_setting_btn 
        {
            background: transparent;
            border: none;
            outline: none;
            padding: 0;
            margin: 0;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: calc(33.333%);
        }
   </style>
</head>

    <script>
        let sliderEle = document.querySelectorAll("round-slider");
        let autoSlider = sliderEle[0];
        let heatSlider = sliderEle[1];
        let coolSlider = sliderEle[2];
        //show/hide slider by mode
        const enableSliderByMode = function (mode) {
            autoSlider.classList.add('d-none');
            heatSlider.classList.add('d-none');
            coolSlider.classList.add('d-none');
            if (mode == 'auto_mode') {
                setOn();
                autoSlider.classList.add('d-block');
                autoSlider.classList.remove("d-none");
            } else if (mode == 'heat_mode') {
                setOn();
                heatSlider.classList.add('d-block');
                heatSlider.classList.remove("d-none");
            } else if (mode == 'cool_mode') {
                setOn();
                coolSlider.classList.add('d-block');
                coolSlider.classList.remove("d-none");
            } else if (mode == 'off_mode') {
                setOff();
                autoSlider.classList.add('d-block');
                autoSlider.classList.remove("d-none");
            }
            var heat_temperature = parseFloat($(".temperature .heat_temp").text());
            var cool_temperature = parseFloat($(".temperature .cool_temp").text()); 
            setTempOnSlider({ heat_temp: heat_temperature, cool_temp: cool_temperature });
        };

        const setTempOnSlider = function (params) {
            console.log('setTempOnSlider', params);
            console.log(params.cool_temp);
            autoSlider.low = params.heat_temp;
            autoSlider.high = params.cool_temp;
            heatSlider.value = params.heat_temp;
            coolSlider.value = params.cool_temp;
        }

        const setSliderMinMax = function (type) {
            if (type == 'c') {
                console.log('setSliderMinMax for C', minTempC, maxTempC);
                autoSlider.min = heatSlider.min = coolSlider.min = minTempC;
                autoSlider.max = heatSlider.max = coolSlider.max = maxTempC;
            } else if (type == 'f') {
                console.log('csetSliderMinMax for F', minTempF, maxTempF);
                autoSlider.min = heatSlider.min = coolSlider.min = minTempF;
                autoSlider.max = heatSlider.max = coolSlider.max = maxTempF;
            }
        };

        const setOff = function () {
            document.querySelectorAll("round-slider").forEach(function (el) {
                el.readonly = true;
                el.disabled = true;
            });
        };
        const setOn = function () {
            document.querySelectorAll("round-slider").forEach(function (el) {
                el.readonly = false;
                el.disabled = false;
            });
        };

        autoSlider.addEventListener("value-changing", function (ev) {
            var current_heat_temperature = parseFloat($(".temperature .heat_temp").text());
            var current_cool_temperature = parseFloat($(".temperature .cool_temp").text());
            var tempgap = (temp_unit_convert === "c") ? 1.5 : 3;
            var step = (temp_unit_convert === "c") ? 0.5 : 1; // Set step based on unit

            // Heat temprature changing
            if (ev.detail.low !== undefined) {
                let heat_temp = ev.detail.low;
                //increasing tempratrue
                if (heat_temp > current_heat_temperature) {
                    let max_heat_temp = temp_unit_convert === "c" ? maxTempC - 2 : maxTempF - 4;
                    console.log("increasing max_heat_temp", max_heat_temp);
                    if (heat_temp > max_heat_temp) {
                        autoSlider.low = max_heat_temp;
                        return false;
                    }
                    $(".temperature .heat_temp").text(formatTemperature(heat_temp));
                    if ((current_cool_temperature - heat_temp) <= tempgap) {
                        current_cool_temperature += step; // Maintain 3-degree difference
                        console.log("increasing Maintain 3-degree difference heat", current_cool_temperature);
                        autoSlider.high = current_cool_temperature;
                        coolSlider.value = current_cool_temperature;
                        $(".temperature .cool_temp").text(formatTemperature(current_cool_temperature));
                    }
                } else if (heat_temp < current_heat_temperature) { //decreasing tempratrue 
                    let min_heat_temp = temp_unit_convert === "c" ? minTempC : minTempF;
                    console.log("decreasing min_heat_temp", min_heat_temp);
                    if (heat_temp < min_heat_temp) {
                        autoSlider.low = min_heat_temp;
                        return false;
                    }
                    $(".temperature .heat_temp").text(formatTemperature(heat_temp));
                    if ((current_cool_temperature - heat_temp) <= tempgap) {
                        current_cool_temperature -= step; // Maintain 3-degree difference
                        console.log("decreasing Maintain 3-degree difference heat", current_cool_temperature);
                        autoSlider.high = current_cool_temperature;
                        coolSlider.value = current_cool_temperature;
                        $(".temperature .cool_temp").text(formatTemperature(current_cool_temperature));
                    }
                }
            } if (ev.detail.high !== undefined) { // cool temprature changing
                let cool_temp = ev.detail.high;
                console.log('cool temoprature', cool_temp, ' current_cool_temperature', current_cool_temperature);
                //increasing tempratrue
                if (cool_temp > current_cool_temperature) {
                    let max_cool_temp = temp_unit_convert === "c" ? maxTempC : maxTempF;
                    console.log("increasing max_cool_temp", max_cool_temp);
                    if (cool_temp > max_cool_temp) {
                        autoSlider.high = max_cool_temp;
                        return false;
                    }
                    $(".temperature .cool_temp").text(formatTemperature(cool_temp));
                    if ((cool_temp - current_heat_temperature) <= tempgap) {
                        current_heat_temperature += step; // Maintain 3-degree difference
                        console.log("increasing Maintain 3-degree difference cool", current_heat_temperature);
                        autoSlider.low = current_heat_temperature;
                        heatSlider.value = current_heat_temperature;
                        $(".temperature .heat_temp").text(formatTemperature(current_heat_temperature));
                    }
                } else if (cool_temp < current_cool_temperature) { //decreasing tempratrue  
                    let min_cool_temp = temp_unit_convert === "c" ? minTempC + 2 : minTempF + 4;
                    console.log("decreasing min_cool_temp", min_cool_temp);
                    if (cool_temp < min_cool_temp) {
                        autoSlider.high = min_cool_temp;
                        return false;
                    }
                    $(".temperature .cool_temp").text(formatTemperature(cool_temp));
                    if ((cool_temp - current_heat_temperature) <= tempgap) {
                        current_heat_temperature -= step; // Maintain 3-degree difference
                        console.log("decreasing Maintain 3-degree difference cool", current_heat_temperature);
                        autoSlider.low = current_heat_temperature;
                        heatSlider.value = current_heat_temperature;
                        $(".temperature .heat_temp").text(formatTemperature(current_heat_temperature));
                    }
                }
            }
        });

        autoSlider.addEventListener("value-changed", function (ev) {
            if (ev.detail.low !== undefined) {
                let heat_temp = ev.detail.low;
                heatSlider.value = heat_temp;
                $(".temperature .heat_temp").text(heat_temp);
                console.log('heat_temp' + heat_temp);
            } else if (ev.detail.high !== undefined) {
                let cool_temp = ev.detail.high;
                coolSlider.value = cool_temp;
                console.log('cool_temp' + cool_temp);
            }
            var heat_temperature = parseFloat($(".temperature .heat_temp").text());
            var cool_temperature = parseFloat($(".temperature .cool_temp").text());
            //document.getElementById("loading").style.display = "block";
            setTemperatureVar(heat_temperature, cool_temperature);
        });

        heatSlider.addEventListener("value-changing", function (ev) {
            var current_heat_temperature = parseFloat($(".temperature .heat_temp").text());
            var current_cool_temperature = parseFloat($(".temperature .cool_temp").text());
            var tempgap = (temp_unit_convert === "c") ? 1.5 : 3;
            var step = (temp_unit_convert === "c") ? 0.5 : 1; // Set step based on unit
            let heat_temp = ev.detail.value;
            //increasing tempratrue
            if (heat_temp > current_heat_temperature) {
                let max_heat_temp = temp_unit_convert === "c" ? maxTempC - 2 : maxTempF - 4;
                if (heat_temp > max_heat_temp) {
                    heatSlider.value = max_heat_temp;
                    return false;
                }
                $(".temperature .heat_temp").text(formatTemperature(heat_temp));
                if ((current_cool_temperature - heat_temp) <= tempgap) {
                    current_cool_temperature += step; // Maintain 3-degree difference
                    console.log("increasing Maintain 3-degree difference heat", current_cool_temperature);
                    autoSlider.high = current_cool_temperature;
                    coolSlider.value = current_cool_temperature;
                    $(".temperature .cool_temp").text(formatTemperature(current_cool_temperature));
                }
            } else if (heat_temp < current_heat_temperature) { //decreasing tempratrue 
                let min_heat_temp = temp_unit_convert === "c" ? minTempC : minTempF;
                if (heat_temp < min_heat_temp) {
                    heatSlider.value = min_heat_temp;
                    return false;
                }
                $(".temperature .heat_temp").text(formatTemperature(heat_temp));
                if ((current_cool_temperature - heat_temp) <= tempgap) {
                    current_cool_temperature -= step; // Maintain 3-degree difference
                    console.log("decreasing Maintain 3-degree difference heat", current_cool_temperature);
                    autoSlider.high = current_cool_temperature;
                    coolSlider.value = current_cool_temperature;
                    $(".temperature .cool_temp").text(formatTemperature(current_cool_temperature));
                }
            }
        });

        heatSlider.addEventListener("value-changed", function (ev) {
            let heat_temp = ev.detail.value;
            autoSlider.low = heat_temp;
            console.log('heat_temp' + heat_temp);
            var heat_temperature = parseFloat($(".temperature .heat_temp").text());
            var cool_temperature = parseFloat($(".temperature .cool_temp").text());
            //document.getElementById("loading").style.display = "block";
            setTemperatureVar(heat_temperature, cool_temperature);
        });

        coolSlider.addEventListener("value-changing", function (ev) {
            var current_heat_temperature = parseFloat($(".temperature .heat_temp").text());
            var current_cool_temperature = parseFloat($(".temperature .cool_temp").text());
            var tempgap = (temp_unit_convert === "c") ? 1.5 : 3;
            var step = (temp_unit_convert === "c") ? 0.5 : 1; // Set step based on unit
            let cool_temp = ev.detail.value;
            console.log('cool temoprature', cool_temp, ' current_cool_temperature', current_cool_temperature);
            //increasing tempratrue
            if (cool_temp > current_cool_temperature) {
                let max_cool_temp = temp_unit_convert === "c" ? maxTempC : maxTempF;
                if (cool_temp > max_cool_temp) {
                    coolSlider.value = max_cool_temp;
                    return false;
                }
                $(".temperature .cool_temp").text(formatTemperature(cool_temp));
                if ((cool_temp - current_heat_temperature) <= tempgap) {
                    current_heat_temperature += step; // Maintain 3-degree difference
                    console.log("increasing Maintain 3-degree difference cool", current_heat_temperature);
                    autoSlider.low = current_heat_temperature;
                    heatSlider.value = current_heat_temperature;
                    $(".temperature .heat_temp").text(formatTemperature(current_heat_temperature));
                }
            } else if (cool_temp < current_cool_temperature) { //decreasing tempratrue  
                let min_cool_temp = temp_unit_convert === "c" ? minTempC + 2 : minTempF + 4;
                if (cool_temp < min_cool_temp) {
                    coolSlider.value = min_cool_temp;
                    return false;
                }
                $(".temperature .cool_temp").text(formatTemperature(cool_temp));
                if ((cool_temp - current_heat_temperature) <= tempgap) {
                    current_heat_temperature -= step; // Maintain 3-degree difference
                    console.log("decreasing Maintain 3-degree difference cool", current_heat_temperature);
                    autoSlider.low = current_heat_temperature;
                    heatSlider.value = current_heat_temperature;
                    $(".temperature .heat_temp").text(formatTemperature(current_heat_temperature));
                }
            }
        });

        coolSlider.addEventListener("value-changed", function (ev) {
            let cool_temp = ev.detail.value;
            autoSlider.high = cool_temp;
            coolSlider.value = cool_temp;
            console.log('cool_temp' + cool_temp);
            var heat_temperature = parseFloat($(".temperature .heat_temp").text());
            var cool_temperature = parseFloat($(".temperature .cool_temp").text());
            //document.getElementById("loading").style.display = "block";
            setTemperatureVar(heat_temperature, cool_temperature);
        }); 

         let currentValue = 0;

        const picker = document.getElementById("picker");
      
        for (let i = -10; i <= 10; i++) {

            let div = document.createElement("div");

            div.className = "picker-item";
            div.innerText = i;
            div.setAttribute("data-value", i);

            div.addEventListener("click", function () {

                const itemHeight = div.offsetHeight;

                // move clicked item to middle
                let scrollTarget =
                    div.offsetTop -
                    (picker.clientHeight / 1) +
                    (itemHeight / 1);

                // allow top selection
                if (scrollTarget < 0) {
                    scrollTarget = 0;
                }

                // allow bottom selection
                const maxScroll =
                    picker.scrollHeight - picker.clientHeight;

                if (scrollTarget > maxScroll) {
                    scrollTarget = maxScroll;
                }

                picker.scrollTo({
                    top: scrollTarget,
                    behavior: "smooth"
                });

                setTimeout(() => {

                    document.querySelectorAll(".picker-item")
                        .forEach(x => x.classList.remove("active"));

                    div.classList.add("active");

                    currentValue =
                        div.getAttribute("data-value");

                    console.log(currentValue);

                }, 250);
            });

            picker.appendChild(div);
        }
       
        function openPopup() {
            currentValue = document.getElementById("selectedValue").innerText;
            document.getElementById("popup")
                .classList.add("show");

            document.querySelectorAll(".picker-item")
                .forEach(item => {

                    item.classList.remove("active");

                    if (item.getAttribute("data-value") === currentValue) {

                        item.classList.add("active");

                        // scroll item to center
                        item.scrollIntoView({
                            behavior: "smooth",
                            block: "center"
                        });
                    }
            });
        }

        function closePopup() {
            document.getElementById("popup")
                .classList.remove("show");
        }

        function saveValue() {

            document.getElementById("selectedValue")
                .innerText = currentValue;

            closePopup();
            setTemperatureCorrection(currentValue);
            console.log("Saved Value:", currentValue);
        }

        function updateActiveItem() {

            const items = document.querySelectorAll(".picker-item");

            let closestItem = null;
            let closestDistance = Infinity;

            // selection box center
            const selectorCenter = 150; // middle of 240px picker

            items.forEach(item => {

                // item position inside visible area
                const itemTop =
                    item.offsetTop - picker.scrollTop;

                const itemCenter =
                    itemTop + (item.offsetHeight / 2);

                const distance =
                    Math.abs(selectorCenter - itemCenter);

                if (distance < closestDistance) {

                    closestDistance = distance;
                    closestItem = item;
                }
            });

            items.forEach(item => {
                item.classList.remove("active")
                
            });

            if (closestItem) {

                closestItem.classList.add("active");
                
                currentValue =
                    closestItem.getAttribute("data-value");
            }
        }

        picker.addEventListener("scroll", updateActiveItem);

        setTimeout(() => {
            updateActiveItem();
        }, 100);

        function goBack() {
            document.querySelector(".TempCorrectionScreen").style.display = "none";
            document.getElementById("mainPage").style.display = "block";
        }

    </script>
