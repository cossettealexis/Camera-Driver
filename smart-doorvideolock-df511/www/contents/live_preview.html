<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DF511 Door Lock</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');


        .video-container {
            position: relative;
        }

        .header {
            padding: 10px 15px;
            text-align: center;
            background: #1a2228;
            margin-bottom: 10px;
        }

        .header img {
            max-height: 40px;
        }


        .slider-wrapper {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 260px;
            z-index: 10;
        }

        .lock-slider {
            position: relative;
            width: 100%;
            height: 74px;
            border-radius: 999px;
            background: rgba(20, 20, 20, 0.75);
            backdrop-filter: blur(8px);
            overflow: hidden;
            user-select: none;
        }

        .slider-thumb {
            position: absolute;
            left: 4px;
            top: 4px;
            width: 66px;
            height: 66px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            cursor: grab;
            z-index: 2;
            transition: transform .2s;
        }

        .slider-label {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: #fff;
            font-size: 24px;
            font-weight: 400;
            pointer-events: none;
        }

        .arrows {
            opacity: .6;
            letter-spacing: 4px;
        }

        .lock-slider.unlocked {
            background: #00aaff;
        }

        .lock-slider.unlocked .slider-label {
            color: #fff;
        }

        .video-container {
            position: relative;
            width: 100%;
            height: 480px;
            /* Adjust as needed */
            background: #000;
            margin: 10px 0;
            overflow: hidden;
        }

        #liveVideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-overlay {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(220, 0, 0, 0.9);
            color: white;
            font-size: 13px;
            padding: 4px 10px;
            border-radius: 4px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* Unlock Button */
        .unlock-area {
            padding: 25px 30px 40px;
        }

        .unlock-btn {
            width: 100%;
            max-width: 340px;
            height: 110px;
            background: #1a2228;
            color: #fff;
            border: none;
            border-radius: 9999px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            font-size: 29px;
            font-weight: 600;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
            touch-action: manipulation;
        }

        .lock-circle {
            width: 72px;
            height: 72px;
            background: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 3px 6px rgba(0, 0, 0, 0.2);
        }

        .unlock-icon {
            width: 40px;
            height: 40px;
        }

        .slider-thumb {
            touch-action: none;
        }

        .lock-slider {
            touch-action: none;
        }

        .bottom-controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 25px;
            z-index: 100;
        }

        .control-btn {
            width: 68px;
            height: 68px;
            border-radius: 50%;
            background: rgba(26, 34, 40, 0.95);
            border: 2px solid rgba(255, 255, 255, 0.15);
            color: white;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            transition: all 0.2s;
        }

        .control-btn:hover {
            background: rgba(26, 34, 40, 0.8);
            transform: scale(1.05);
        }

        .control-btn.active {
            background: #00aaff;
            border-color: #00ccff;
            transform: scale(1.1);
        }

        .control-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
    </style>
</head>

<body style="background: #0f141a">
    <div class="smartlockui">

        <header class="header">
            <img src="images/slomins-logo-new-white.png" alt="Slomins" />
        </header>

        <!-- Status -->
        <div class="status_blk">
            <div class="battery-wrapper">
                <i class="battery-icon" id="batteryIcon" data-percent="100"></i>
                <span class="battery-percent" id="batteryText"></span>
            </div>
        </div>

        <!-- LIVE CAMERA PREVIEW -->
        <div class="video-container">
            <video id="liveVideo" autoplay playsinline muted loop></video>
            <div class="video-overlay">LIVE • 150KB/S</div>
            <div class="slider-wrapper">
                <div id="lockSlider" class="lock-slider locked">
                    <div id="sliderThumb" class="slider-thumb">
                        🔒
                    </div>

                    <div class="slider-label">
                        <span id="sliderText">Unlock</span>
                        <span class="arrows">› › ›</span>
                    </div>
                </div>
            </div>
        </div>


        <div class="bottom-controls">
            <button id="screenshotBtn" class="control-btn">
                <i data-lucide="camera"></i>

            </button>
            <button class="control-btn" id="micBtn" disabled>
                <i data-lucide="mic"></i>
            </button>
            <button id="recordBtn" class="control-btn" disabled>
                <i data-lucide="video"></i>
            </button>
        </div>
    </div>

    <div class="modal fade" id="screenshotModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content bg-dark text-white">
                <div class="modal-header border-0">
                    <h5 class="modal-title">Latest Camera Screenshot</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center p-2">
                    <img id="screenshotImage" src="http://192.168.1.2:3333/wps-cgi/image.cgi?resolution=640x480"
                        class="img-fluid rounded" style="max-height: 70vh; width: auto;" alt="Camera Screenshot">
                    <div id="screenshotLoading" class="text-center py-4">
                        <div class="spinner-border text-light" role="status"></div>
                        <p class="mt-2">Capturing latest image...</p>
                    </div>
                    <div id="urlDisplayContainer" class="mt-3 px-3">
                        <div id="urlDisplay"
                            style="background:#1a2228; padding:8px; border-radius:6px; font-size:11px; word-break:break-all; color:#0f0; text-align:left; max-height:80px; overflow:auto;">
                            Waiting for URL...
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                   
                </div>
            </div>
        </div>
    </div>

    <!-- Your scripts remain the same -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="js/jquery-3.7.1.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="javascript/index-live.js" type="text/javascript"></script>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
