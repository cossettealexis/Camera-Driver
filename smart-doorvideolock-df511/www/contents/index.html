<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DF511 Door Lock</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

        body {
            /* background: linear-gradient(to bottom, #e7e7e7 0%, #bec0c3 99%);*/
            background: #101010;

            font-family: "Poppins", sans-serif;
            padding: 0;
            overflow-x: hidden;
            overflow-y: scroll;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        img {
            max-width: 100%;
        }

        .header {
            padding: 10px 15px;
            text-align: center;
            background: #1a2228;
            margin-bottom: 10px;
        }

        .header img {
            max-height: 40px;
        }

        /*Smart lock start*/

        .smart_lock_btn .lock_icon {
            display: none;
        }

        .smart_lock_wrap {
            min-height: calc(100vh - 230px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .smart_lock_inner {
            display: flex;
            justify-content: center;
            width: 100%;
        }

        .smart_lock_btn {
            width: 100%;
              max-width: 300px;
            height: 300px;
            border-radius: 100%;
            background: radial-gradient(ellipse at center, #fbe6d2 0%, #f59c78 100%);
            ;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            border: 20px solid #F57351;
            position: relative;
        }

        .smart_lock_btn.lock {
            background: radial-gradient(ellipse at center, #e4efe9 0%, #93a5cf 100%);
        }

        .smart_lock_btn .unlock_icon svg path {
            fill: #F57351;
        }

       

        .smart_lock_btn span {
            width: 100%;
            text-align: center;
        }

        .smart_lock_btn span svg {
            height: 90px;
        }

        .smart_lock_btn.lock {
            border-color: #00aaff;
        }

        .smart_lock_btn.lock .unlock_icon {
            display: none;
        }

        .smart_lock_btn.lock .lock_icon {
            display: block;
        }

        .lock_status {
            margin-top: 10px;
            font-size: 14px;
        }

        .smart_lock_btn .lock_status {
            color: #455a64;
            font-weight: 600;
        }

        .smart_lock_btn.lock .lock_status {
            color: #455a64;
            font-weight: 600;
        }

        .smart_lock_btn.lock .lock_icon svg path {
            fill: #00aaff;
        }

        .sucess_popup {
            position: absolute;
            bottom: 15%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: #fff;
            border-radius: 200px;
            padding: 8px 20px;
            color: #1a2228;
            border: 1px solid #1a2228;
            display: none;
        }

        .circle-shade {
            position: absolute;
            width: 300px !important;
        }

        .circle-shade circle {
            stroke-dasharray: 296 296;
            stroke-dashoffset: 296;
            animation: grow 2s ease-out infinite;

        }

        .circle-shade .lock {
            stroke: #f3532a;
        }

        .circle-shade .unlock {
            stroke: #099ce3;
        }

        @keyframes grow {
            100% {
                stroke-dashoffset: 0;
            }
        }

        .smart_lock_btn img {
            max-width: 130px;
        }

       

        .camera_preview {
            color: #0b5ed7;
            font-size: 14px;
        }

         .camera-panel {
            flex: 1;
            margin: 16px;
            border-radius: 16px;
            /* CLDBUS blue gradient */
            background: #1c1c1e;
            width: 100%;
            max-width: 360px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-top: 11px;
            padding-bottom: 11px;
            border: 1px solid #4b4b51;

        }

        .camera-icon {
    font-size: 36px;
    color: #01a6fe;
}

        .camera-icon path {
            fill: #9fd0ff;
        }

        .camera-title {
            color: #ffffff;
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .camera-subtitle {
            color: rgba(255, 255, 255, 0.75);
            font-size: 12px;
            margin-top: -8px;
        }
          /* Video Container */
        #videoContainer {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 9999;
            padding: 20px;
            overflow-y: auto;
            text-align: center;
        }

        #videoContainer .close-overlay {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 24px;
            color: white;
            cursor: pointer;
        }

        #videoContainer canvas,
        #videoContainer img {
            max-width: 100%;
            border-radius: 12px;
        }

        #stream-speed {
            color: #00ffea;
            font-size: 12px;
            margin-top: 8px;
        }

        #streamLoader {
            color: white;
        }
    </style>
</head>

<body>
        <script src="lockstate.js"></script>
    <div class="sucess_popup">Sucess</div>
    <div class="overlay"></div>
    <!--Header start-->
    <div class="smartlockui" >
   
        <header class="header">
            <img src="images/slomins-logo-new-white.png" alt="Slomins" />
        </header>
        <div class="smart_lock_wrap">
            <div class="smart_lock_inner">
                <button class="smart_lock_btn">
                    <svg class="circle-shade" viewBox="0 0 100 100" style="display: none;">
                        <circle class="lock" cx="50" cy="50" r="47" transform="rotate(-90 50 50)" pointer-events="all"
                            stroke-width="6" fill="none" />
                    </svg>
                    <span class="unlock_icon">
                        <img src="images/unlock.png" alt="Unlock" />
                    </span>
                    <span class="lock_icon">
                        <img src="images/lock.png" alt="Lock" />
                    </span>
                    <span class="lock_status">Hold to lock</span>
                </button>
            </div>
        </div>
    </div>
    <!--Smartlock start-->
<!--<div class="camera-panel">
    <i class="bi bi-camera-video camera-icon"></i>

    <p class="camera-title">Live Preview</p>
    <p class="camera-subtitle">Tap to wake front door camera</p>

</div>-->
    

   <div id="videoContainer">
        <i class="bi bi-x-lg close-overlay" id="btnCloseVideo"></i>
        <div class="video-content text-center">
            <div id="streamLoader">
                 <div class="spinner-border text-primary mb-3" role="status"></div>
                <p>Initializing Secure Stream...</p>
            </div>
             <canvas id="videoCanvas"
                style="display:none; width:100%; border-radius:12px;">
        </canvas>
        </div>
    </div>

    <script src="js/jquery-3.7.1.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <script src="javascript/index.js" type="text/javascript"></script>
    <script src="js/panzoom.min.js"></script>
    <script src="js/jsmpeg.min.js"></script>

</body>

</html>
