<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DF511 Door Lock</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        img {
            max-width: 100%;
        }

        html {
            height: 100%;
        }

        body {
            background: linear-gradient(to bottom, #e7e7e7 0%, #bec0c3 100%);
            font-family: "Poppins", sans-serif;
            padding: 0;
            min-height: 100%;
            overflow: hidden;
        }

        .smartlockui {
            min-height: 100vh;
            background: linear-gradient(to bottom, #e7e7e7 0%, #bec0c3 100%) !important;
        }

        /* ── Header ── */
        .header {
            padding: 10px 15px;
            text-align: center;
            background: #1a2228;
            margin-bottom: 10px;
        }

        .header img {
            max-height: 40px;
        }

        /* ── Battery ── */
        .status_blk {
            display: flex !important;
            flex-direction: column;
            /* 🔥 stack vertically */
            align-items: center;
            /* center horizontally */
            justify-content: center;
            gap: 6px;
            margin-top: 10px;
        }

        .status_blk p {
            font-size: 14px;
            font-weight: 300;
            margin-bottom: 0;
            color: #444;
        }

        i.battery-icon {
            height: 13px;
            width: 26px;
            top: -1px;
            background-color: #fff;
            border: 2px solid #000;
            display: inline-block;
            position: relative;
            vertical-align: middle;
        }

        i.battery-icon:after,
        i.battery-icon:before {
            background: #000;
            content: '';
            position: absolute;
        }

        i.battery-icon:before {
            width: 2px;
            bottom: 1px;
            right: -4px;
            top: 1px;
        }

        i.battery-icon:after {
            bottom: 2px;
            left: 2px;
            top: 2px;
        }

        i.battery-icon[data-percent="100"]:after {
            right: 2px;
            background-color: #49db49;
        }

        i.battery-icon[data-percent="75"]:after {
            right: 6px;
            background-color: #49db49;
        }

        i.battery-icon[data-percent="50"]:after {
            right: 10px;
            background-color: #49db49;
        }

        i.battery-icon[data-percent="25"]:after {
            right: 16px;
            background-color: orange;
        }

        i.battery-icon[data-percent="10"]:after {
            right: 18px;
            background-color: red;
        }

        i.battery-icon[data-percent="10"]:after {
            right: 18px;
            background-color: red;
        }

        i.battery-icon[data-percent="10"] {
            border-color: #ff0000;
            animation: battBlink 1.2s ease-in-out infinite;
        }

        i.battery-icon[data-percent="25"] {
            border-color: orange;
        }

        @keyframes battBlink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.2;
            }
        }

        /* ── Smart Lock ── */
        .smart_lock_btn .lock_icon {
            display: none;
        }

        .smart_lock_wrap {
            min-height: calc(100vh - 105px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .smart_lock_inner {
            display: flex;
            justify-content: center;
            width: 100%;
        }

        .smart_lock_btn {
            width: 100%;
            max-width: 300px;
            height: 300px;
            border-radius: 100%;
            background: radial-gradient(ellipse at center, #fbe6d2 0%, #f59c78 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            border: 20px solid #F57351;
            position: relative;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        .smart_lock_btn.lock {
            background: radial-gradient(ellipse at center, #e4efe9 0%, #93a5cf 100%);
            border-color: #00aaff;
        }

        .smart_lock_btn span {
            width: 100%;
            text-align: center;
        }

        .smart_lock_btn span svg {
            height: 90px;
        }

        .smart_lock_btn.lock .unlock_icon {
            display: none;
        }

        .smart_lock_btn.lock .lock_icon {
            display: block;
        }

        .lock_status {
            margin-top: 10px;
            font-size: 14px;
            color: #455a64;
            font-weight: 600;
        }

        .smart_lock_btn img {
            max-width: 130px;
        }

        .circle-shade {
            position: absolute;
            width: 300px !important;
        }

        .circle-shade circle {
            stroke-dasharray: 296 296;
            stroke-dashoffset: 296;
            animation: grow 2s ease-out infinite;
        }

        .circle-shade .lock {
            stroke: #f3532a;
        }

        .circle-shade .unlock {
            stroke: #099ce3;
        }

        @keyframes grow {
            100% {
                stroke-dashoffset: 0;
            }
        }

        .sucess_popup {
            position: absolute;
            bottom: 15%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: #fff;
            border-radius: 200px;
            padding: 8px 20px;
            color: #1a2228;
            border: 1px solid #1a2228;
            display: none;
            text-align: center;
        }
    </style>
</head>

<body>

    <div class="sucess_popup">Success</div>
    <div class="overlay"></div>

    <div class="smartlockui" style="display:none;">

        <header class="header">
            <img src="images/slomins-logo-new-white.png" alt="Slomins" />
        </header>
        <div class="status_blk">
            <div class="battery-wrapper">
                <i class="battery-icon" id="batteryIcon" data-percent="100"></i>
                <span class="battery-percent" id="batteryText"></span>
            </div>
        </div>
        <div class="smart_lock_wrap">
            <div class="smart_lock_inner">
                <button class="smart_lock_btn" id="lockBtn" style="touch-action: manipulation; -webkit-tap-highlight-color: rgba(0,0,0,0);">
                    <svg class="circle-shade" viewBox="0 0 100 100" style="display: none;">
                        <circle class="lock" cx="50" cy="50" r="47" transform="rotate(-90 50 50)" pointer-events="all"
                            stroke-width="6" fill="none" />
                    </svg>
                    <span class="unlock_icon">
                        <img src="images/unlock.png" alt="Unlock" />
                    </span>
                    <span class="lock_icon">
                        <img src="images/lock.png" alt="Lock" />
                    </span>
                    <span class="lock_status">Hold to lock</span>
                </button>
            </div>
        </div>

    </div>

    <script src="js/jquery-3.7.1.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <script src="javascript/index.js?v=2" type="text/javascript"></script>
</body>

</html>
