<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Smart Switch</title>
    <style>
        body {
            background: radial-gradient(rgb(140, 143, 149) 0%, rgb(0, 0, 0) 100%) center center no-repeat rgb(0, 0, 0);
            color: white;
            font-family: Arial, sans-serif;
            width: 100%; 
            margin: 0;
        }

        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .switch-container {
            text-align: center;
        }

        .power-button {
            width: 200px;
            height: 200px;
            background: #2E304B;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center; 
            border: none;
            cursor: pointer;
            outline: none;
            color: #ffffff;
            transition: 0.3s;
            box-shadow: 0px 5px 12px 0px rgba(0, 0, 0, 0.7);
        }

        .power-on {
            background: linear-gradient(to bottom, #bada55 0%, rgb(121 203 47) 99%);
        }

        .power-off {
            background: linear-gradient(to bottom, #e7e7e7 0%, #bec0c3 99%);
        }

        .status-text {
            margin-top: 15px;
            font-size: 18px;
        }

        .bottom-buttons {
            margin-top: 20px;
            display: flex;
            gap: 20px;
        }

        .btn {
            background: #333;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }

        .header {
            padding: 10px 15px;
            text-align: center;
            background: #1a2228;
            margin-bottom: 10px;
            position: fixed;
            width: 100%;
        }

        .header img {
            max-height: 40px;
        }
    </style>
</head>

<body>
    <header class="header">
        <img src="images/slomins-logo-new-white.png" alt="Slomins">
    </header>
    <main>
        <!--Header start-->
        <div class="smartswitchui switch-container" style="display : none;">
            <button id="powerButton" class="power-button power-off" onclick="togglePower()">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"
                    style="width: 85px;fill: #ffffff;z-index:999;">
                    <path
                        d="M400 54.1c63 45 104 118.6 104 201.9 0 136.8-110.8 247.7-247.5 248C120 504.3 8.2 393 8 256.4 7.9 173.1 48.9 99.3 111.8 54.2c11.7-8.3 28-4.8 35 7.7L162.6 90c5.9 10.5 3.1 23.8-6.6 31-41.5 30.8-68 79.6-68 134.9-.1 92.3 74.5 168.1 168 168.1 91.6 0 168.6-74.2 168-169.1-.3-51.8-24.7-101.8-68.1-134-9.7-7.2-12.4-20.5-6.5-30.9l15.8-28.1c7-12.4 23.2-16.1 34.8-7.8zM296 264V24c0-13.3-10.7-24-24-24h-32c-13.3 0-24 10.7-24 24v240c0 13.3 10.7 24 24 24h32c13.3 0 24-10.7 24-24z">
                    </path>
                </svg>
            </button>
            <div id="statusText" class="status-text">Power OFF</div>
        </div>
    </main>

    <!--Smartlock start-->

    <script src="js/jquery-3.7.1.js"></script>
    <script src="javascript/index.js" type="text/javascript"></script>

</body>

</html>
